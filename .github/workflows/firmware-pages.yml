name: Firmware Pages

on:
  push:
    tags:
      - "firmware-*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: firmware-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build firmware site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FIRMWARE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: FIRMWARE/requirements.txt

      - name: Install PlatformIO
        run: python -m pip install --upgrade -r requirements.txt

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('FIRMWARE/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Build firmware
        env:
          RIDESCOPE_SKIP_FTP_PUBLISH: "1"
        run: platformio run

      - name: Prepare Pages artifact
        run: |
          mkdir -p ../public/firmware
          cp .pio/build/esp32c6/firmware.bin ../public/firmware/firmware.bin
          cp .pio/build/esp32c6/manifest.json ../public/firmware/manifest.json
          cat > ../public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>RideScope firmware</title>
            </head>
            <body>
              <h1>RideScope firmware</h1>
              <ul>
                <li><a href="firmware/manifest.json">manifest.json</a></li>
                <li><a href="firmware/firmware.bin">firmware.bin</a></li>
              </ul>
            </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy firmware site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
