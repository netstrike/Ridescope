name: Firmware

on:
  push:
    branches:
      - main
    tags:
      - "firmware-*"
    paths:
      - "FIRMWARE/**"
      - ".github/workflows/firmware.yml"
  pull_request:
    paths:
      - "FIRMWARE/**"
      - ".github/workflows/firmware.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ESP32-C6 firmware
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FIRMWARE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: FIRMWARE/requirements.txt

      - name: Install PlatformIO
        run: python -m pip install --upgrade -r requirements.txt

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('FIRMWARE/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Build firmware
        env:
          RIDESCOPE_SKIP_FTP_PUBLISH: "1"
        run: platformio run

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ridescope-firmware-${{ github.sha }}
          path: |
            FIRMWARE/.pio/build/esp32c6/firmware.bin
            FIRMWARE/.pio/build/esp32c6/manifest.json
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/firmware-')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            .pio/build/esp32c6/firmware.bin \
            .pio/build/esp32c6/manifest.json \
            --title "RideScope firmware ${GITHUB_REF_NAME#firmware-}" \
            --notes "Firmware RideScope build ${GITHUB_SHA}. Include firmware.bin e manifest.json per OTA." \
            --verify-tag
