; Configurazione PlatformIO per il firmware inclinometro moto
; Board reale: Waveshare ESP32-C6 Mini Development Board / ESP32-C6-Zero
; MCU: ESP32-C6FH8

[platformio]
default_envs = esp32c6
src_dir = src

[env:esp32c6]
; Allineamento alla toolchain Arduino attuale per ESP32-C6:
; - in Arduino IDE Waveshare indica la board "Waveshare ESP32-C6-Zero"
; - in PlatformIO il progetto usa il profilo compatibile "esp32-c6-devkitc-1"
;   tramite il platform pioarduino, che include il supporto Arduino per C6.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
upload_flags =
  --no-stub
board_build.flash_size = 8MB
board_build.partitions = extras/partitions_8mb_ota.csv
extra_scripts =
  pre:extras/pio_toolchain_fix.py
  pre:extras/pio_build_metadata.py
build_src_filter =
  +<*>
lib_deps =
  bblanchon/ArduinoJson @ ^7.0.4
custom_firmware_version = 4.5.0
custom_publish_enabled = no
custom_publish_ftp_url = ftp://ftp.sparvieri.org/www.sparvieri.org/ridescope/firmware
custom_publish_ftp_user =
custom_publish_ftp_password =
custom_publish_firmware_name = firmware.bin
custom_publish_manifest_name = manifest.json
custom_publish_ftp_timeout_s = 15
custom_publish_ftps_enabled = yes
custom_publish_ftps_verify_cert = no
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=0
